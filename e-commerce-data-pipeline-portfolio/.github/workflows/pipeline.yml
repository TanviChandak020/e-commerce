name: E-Commerce Data Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:  # Allow manual trigger

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify imports
        run: |
          python -c "import pandas; import pyspark; import dbt; print('✅ All imports successful')"

  ingest-api:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch FakeStore API data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          S3_RAW_BUCKET: ${{ secrets.S3_RAW_BUCKET }}
        run: |
          export PYTHONPATH=${{ github.workspace }}/pipeline:$PYTHONPATH
          python pipeline/ingestion/fetch_api_data.py

  ingest-inventory:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate inventory CSV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          S3_RAW_BUCKET: ${{ secrets.S3_RAW_BUCKET }}
        run: |
          export PYTHONPATH=${{ github.workspace }}/pipeline:$PYTHONPATH
          python pipeline/ingestion/generate_inventory.py

  transform-spark:
    runs-on: ubuntu-latest
    needs: [ingest-api, ingest-inventory]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install Java for Spark
        run: sudo apt-get update && sudo apt-get install -y default-jdk
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Spark transformation
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          S3_RAW_BUCKET: ${{ secrets.S3_RAW_BUCKET }}
        run: |
          export PYTHONPATH=${{ github.workspace }}/pipeline:$PYTHONPATH
          python pipeline/spark/transform_data.py

  load-snowflake:
    runs-on: ubuntu-latest
    needs: transform-spark
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Load data to Snowflake
        env:
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: |
          python << 'EOF'
          import snowflake.connector
          import os
          
          conn = snowflake.connector.connect(
              user=os.getenv('SNOWFLAKE_USER'),
              password=os.getenv('SNOWFLAKE_PASSWORD'),
              account=os.getenv('SNOWFLAKE_ACCOUNT'),
              warehouse=os.getenv('SNOWFLAKE_WAREHOUSE'),
              database=os.getenv('SNOWFLAKE_DATABASE')
          )
          
          cursor = conn.cursor()
          with open('pipeline/snowflake/copy_into.sql', 'r') as f:
              sql_statements = f.read().split(';')
              for statement in sql_statements:
                  if statement.strip():
                      cursor.execute(statement.strip())
                      print(f"✅ Executed: {statement.strip()[:50]}...")
          
          cursor.close()
          conn.close()
          print("✅ Snowflake load complete")
          EOF

  dbt-run:
    runs-on: ubuntu-latest
    needs: load-snowflake
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configure dbt profile
        env:
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          ecommerce_pipeline:
            outputs:
              dev:
                type: snowflake
                account: ${SNOWFLAKE_ACCOUNT}
                user: ${SNOWFLAKE_USER}
                password: ${SNOWFLAKE_PASSWORD}
                role: ACCOUNTADMIN
                warehouse: ECOM_WH
                database: ECOM_DB
                schema: STAGING
                threads: 4
                client_session_keep_alive: False
            target: dev
          EOF
      
      - name: Run dbt models
        run: |
          cd pipeline/dbt
          dbt run --profiles-dir ~/.dbt

  dbt-test:
    runs-on: ubuntu-latest
    needs: dbt-run
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configure dbt profile
        env:
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          ecommerce_pipeline:
            outputs:
              dev:
                type: snowflake
                account: ${SNOWFLAKE_ACCOUNT}
                user: ${SNOWFLAKE_USER}
                password: ${SNOWFLAKE_PASSWORD}
                role: ACCOUNTADMIN
                warehouse: ECOM_WH
                database: ECOM_DB
                schema: STAGING
                threads: 4
                client_session_keep_alive: False
            target: dev
          EOF
      
      - name: Run dbt tests
        run: |
          cd pipeline/dbt
          dbt test --profiles-dir ~/.dbt

  notify-success:
    runs-on: ubuntu-latest
    needs: [dbt-test]
    if: success()
    steps:
      - name: Pipeline completed successfully
        run: |
          echo "✅ Pipeline execution completed successfully!"
          echo "Data flow:"
          echo "  1. ✅ API data ingested"
          echo "  2. ✅ Inventory generated"
          echo "  3. ✅ Spark transformation completed"
          echo "  4. ✅ Data loaded to Snowflake"
          echo "  5. ✅ dbt models created"
          echo "  6. ✅ Data quality tests passed"
