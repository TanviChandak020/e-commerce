ecommerce_profile:
  target: snowflake_dev
  outputs:
    snowflake_dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: ACCOUNTADMIN
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'ECOM_DB') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'ECOM_WH') }}"
      schema: raw
      threads: 4
      client_session_keep_alive: false
