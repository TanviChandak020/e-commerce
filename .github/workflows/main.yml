name: E-Commerce Data Pipeline

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify installation
        run: python -c "import pandas, pyspark; print('✅ Dependencies installed')"

  ingest-api:
    runs-on: ubuntu-latest
    needs: setup
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch API data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "⚠️  Skipped: AWS secrets not configured"
            exit 0
          fi
          export PYTHONPATH=${{ github.workspace }}/pipeline:$PYTHONPATH
          python pipeline/ingestion/fetch_api_data.py

  ingest-inventory:
    runs-on: ubuntu-latest
    needs: setup
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate inventory
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "⚠️  Skipped: AWS secrets not configured"
            exit 0
          fi
          export PYTHONPATH=${{ github.workspace }}/pipeline:$PYTHONPATH
          python pipeline/ingestion/generate_inventory.py

  summary:
    runs-on: ubuntu-latest
    needs: [ingest-api, ingest-inventory]
    if: always()
    steps:
      - name: Pipeline summary
        run: |
          echo "✅ Pipeline workflow completed"
          echo ""
          echo "📋 Next steps:"
          echo "1. Go to GitHub > Settings > Secrets and variables > Actions"
          echo "2. Add the following secrets:"
          echo "   - AWS_ACCESS_KEY_ID"
          echo "   - AWS_SECRET_ACCESS_KEY"
          echo "   - AWS_DEFAULT_REGION"
          echo "   - S3_RAW_BUCKET"
          echo "   - SNOWFLAKE_USER"
          echo "   - SNOWFLAKE_PASSWORD"
          echo "   - SNOWFLAKE_ACCOUNT"
          echo "   - SNOWFLAKE_WAREHOUSE"
          echo "   - SNOWFLAKE_DATABASE"
          echo ""
          echo "3. Push a new commit to trigger the pipeline with full execution"
